[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
  "MPL-2.0",
  "LGPL-3.0-or-later",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

# Phase 2 (M3 ZK): consider denying duplicate ark-* versions, e.g.:
# [[bans.deny]]
# name = "ark-*"
# multiple-versions = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
