services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: oracle
      POSTGRES_DB: oracle
    ports:
      - "5432:5432"
    volumes:
      - oracle_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle -d oracle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  oracle_pg_data:
