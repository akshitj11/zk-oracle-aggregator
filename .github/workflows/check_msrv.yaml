name: Check MSRV

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-msrv:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-msrv
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv

      - name: Read MSRV from crate manifest
        id: data-msrv
        run: |
          current_msrv=$(cargo msrv --manifest-path crates/oracle-core/Cargo.toml show --output-format minimal | tr -d '[:space:]')
          echo "current msrv: $current_msrv"
          echo "current=$current_msrv" >> "$GITHUB_OUTPUT"

      - name: Build and test at MSRV
        run: |
          MSRV="${{ steps.data-msrv.outputs.current }}"
          rustup toolchain install "$MSRV" --profile minimal
          rustup run "$MSRV" cargo check -p oracle-core --all-targets --locked
          rustup run "$MSRV" cargo test -p oracle-core --locked
